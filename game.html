<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ CLAUDE KART ✨ - Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Fredoka One', cursive, sans-serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 3px rgba(124,77,204,0.4);
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: none;
        }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(6,2,20,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-size: 13px;
            font-family: monospace;
            border-left: 4px solid #ffd166;
            pointer-events: none;
            z-index: 100;
            letter-spacing: 0.5px;
        }

        .controls-hint span {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 10px;
            margin: 0 5px;
            font-weight: bold;
            color: #ffd166;
            font-family: monospace;
            font-size: 14px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="controls-hint">
        🎮 <span>← →</span> DIRECCIÓN &nbsp;&nbsp;|&nbsp;&nbsp; 
        <span>↑</span> ACELERAR &nbsp;&nbsp;|&nbsp;&nbsp;
        <span>↓</span> FRENAR &nbsp;&nbsp;|&nbsp;&nbsp;
        <span>␣</span> USAR ITEM
    </div>
    <script src="renderer.js"></script>
    <script>
        // ================================================================
        //  CLAUDE KART — Lógica principal del juego
        //  Controles arreglados, cámara desde arriba, animaciones mejoradas
        // ================================================================

        class ClaudeKart {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Cámara (vista desde arriba siguiendo al jugador)
                this.camX = 0;
                this.camZ = 0;
                this.camAngle = 0;
                
                // Estado del juego
                this.gameState = 'countdown'; // countdown, racing, finished
                this.countdown = 4;
                this.frame = 0;
                this.lastTime = 0;
                
                // Pista
                this.trackPoints = this.generateTrack();
                
                // Jugadores
                this.players = [];
                this.localPlayerId = 'local';
                this.maxLaps = 3;
                
                // Items disponibles
                this.availableItems = ['🍄', '⚡', '⭐', '🛡️'];
                
                // Controles (ARREGLADOS)
                this.keys = {
                    ArrowUp: false,
                    ArrowDown: false,
                    ArrowLeft: false,
                    ArrowRight: false,
                    Space: false
                };
                
                // Efectos visuales
                this.screenShake = 0;
                this.flashAlpha = 0;
                this.floatingTexts = [];
                
                this.init();
            }
            
            generateTrack() {
                // Circuito ovalado más suave
                const points = [];
                const segments = 100;
                
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const angle = t * Math.PI * 2;
                    
                    // Óvalo con ligeras variaciones
                    let x = Math.cos(angle) * 42;
                    let z = Math.sin(angle) * 32;
                    
                    // Añadir algunas curvas para hacerlo interesante
                    x += Math.sin(angle * 2) * 3;
                    z += Math.cos(angle * 1.5) * 2;
                    
                    points.push({ x, z });
                }
                
                return points;
            }
            
            init() {
                this.resize();
                window.addEventListener('resize', () => this.resize());
                window.addEventListener('keydown', (e) => this.handleKeyDown(e));
                window.addEventListener('keyup', (e) => this.handleKeyUp(e));
                
                // Crear jugadores
                this.players = [
                    { id: 'local', name: 'YOU', x: 0, z: 0, angle: 0, speed: 0, lap: 1, checkpointIdx: 0, item: null, nitro: 0, color: 0, ai: false, totalTime: 0 },
                    { id: 'ai1', name: 'BLAZE', x: 0, z: 0, angle: 0.5, speed: 0, lap: 1, checkpointIdx: 0, item: null, nitro: 0, color: 1, ai: true, aiTarget: 0 },
                    { id: 'ai2', name: 'SHADOW', x: 0, z: 0, angle: 1, speed: 0, lap: 1, checkpointIdx: 0, item: null, nitro: 0, color: 2, ai: true, aiTarget: 0 },
                    { id: 'ai3', name: 'NOVA', x: 0, z: 0, angle: 1.5, speed: 0, lap: 1, checkpointIdx: 0, item: null, nitro: 0, color: 4, ai: true, aiTarget: 0 },
                    { id: 'ai4', name: 'RAPID', x: 0, z: 0, angle: 2, speed: 0, lap: 1, checkpointIdx: 0, item: null, nitro: 0, color: 5, ai: true, aiTarget: 0 }
                ];
                
                // Posicionar en la pista
                this.players.forEach((p, idx) => {
                    const offset = idx * 0.25;
                    const pos = this.getTrackPoint(offset);
                    p.x = pos.x;
                    p.z = pos.z;
                    p.angle = pos.angle;
                });
                
                this.animate();
            }
            
            getTrackPoint(distance) {
                const total = this.trackPoints.length;
                let idx = Math.floor(distance * total) % total;
                let nextIdx = (idx + 1) % total;
                
                const p1 = this.trackPoints[idx];
                const p2 = this.trackPoints[nextIdx];
                const t = (distance * total) % 1;
                
                const x = p1.x + (p2.x - p1.x) * t;
                const z = p1.z + (p2.z - p1.z) * t;
                const angle = Math.atan2(p2.z - p1.z, p2.x - p1.x);
                
                return { x, z, angle };
            }
            
            updateTrackPosition(player) {
                let bestDist = Infinity;
                let bestAngle = player.angle;
                let bestIdx = 0;
                
                // Encontrar el punto más cercano en la pista
                for (let i = 0; i < this.trackPoints.length; i++) {
                    const p = this.trackPoints[i];
                    const dx = p.x - player.x;
                    const dz = p.z - player.z;
                    const dist = dx * dx + dz * dz;
                    
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestIdx = i;
                    }
                }
                
                // Calcular progreso en la vuelta
                const nextIdx = (bestIdx + 1) % this.trackPoints.length;
                const p1 = this.trackPoints[bestIdx];
                const p2 = this.trackPoints[nextIdx];
                
                const dx = p2.x - p1.x;
                const dz = p2.z - p1.z;
                const len = Math.hypot(dx, dz);
                
                if (len > 0.01) {
                    const px = player.x - p1.x;
                    const pz = player.z - p1.z;
                    const t = (px * dx + pz * dz) / (len * len);
                    const clampedT = Math.max(0, Math.min(1, t));
                    
                    // Ángulo de la pista
                    const trackAngle = Math.atan2(dz, dx);
                    bestAngle = trackAngle;
                    
                    // Progreso total
                    player.progress = bestIdx / this.trackPoints.length + clampedT / this.trackPoints.length;
                    
                    // Control de vueltas
                    if (player.lastProgress !== undefined && player.progress < player.lastProgress - 0.5) {
                        player.lap++;
                        if (player.id === 'local') {
                            Renderer.spawnDust(player.x, player.z, 3, '#ffd166');
                            this.addFloatingText(player.x, player.z, `LAP ${player.lap}/${this.maxLaps}`, '#ffd166');
                        }
                        if (player.lap > this.maxLaps) {
                            this.gameState = 'finished';
                        }
                    }
                    player.lastProgress = player.progress;
                }
                
                return bestAngle;
            }
            
            addFloatingText(x, z, text, color) {
                this.floatingTexts.push({
                    x, z, text, color,
                    life: 1,
                    offsetY: 0
                });
            }
            
            handleKeyDown(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (!this.keys.Space) {
                        this.keys.Space = true;
                        this.useItem();
                    }
                    return;
                }
                
                const keyMap = {
                    'ArrowUp': 'ArrowUp',
                    'ArrowDown': 'ArrowDown', 
                    'ArrowLeft': 'ArrowLeft',
                    'ArrowRight': 'ArrowRight'
                };
                
                if (keyMap[e.key]) {
                    this.keys[e.key] = true;
                    e.preventDefault();
                }
            }
            
            handleKeyUp(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    this.keys.Space = false;
                    return;
                }
                
                const keyMap = {
                    'ArrowUp': 'ArrowUp',
                    'ArrowDown': 'ArrowDown',
                    'ArrowLeft': 'ArrowLeft', 
                    'ArrowRight': 'ArrowRight'
                };
                
                if (keyMap[e.key]) {
                    this.keys[e.key] = false;
                    e.preventDefault();
                }
            }
            
            useItem() {
                const player = this.players.find(p => p.id === 'local');
                if (!player || !player.item || this.gameState !== 'racing') return;
                
                // Efecto visual de lanzamiento
                this.screenShake = 10;
                this.flashAlpha = 0.7;
                
                // Animación de partículas
                Renderer.spawnItemEffect(player.x, player.z, player.item);
                
                // Efecto según item
                if (player.item === '🍄') {
                    player.speed = Math.min(player.speed + 7, 28);
                    player.nitro = Math.min(1, player.nitro + 0.25);
                    this.addFloatingText(player.x, player.z, '🍄 BOOST!', '#06d6a0');
                } else if (player.item === '⚡') {
                    // Golpear a oponentes cercanos
                    this.players.forEach(p => {
                        if (p.id !== 'local') {
                            const dx = p.x - player.x;
                            const dz = p.z - player.z;
                            const dist = Math.hypot(dx, dz);
                            if (dist < 10) {
                                p.speed = Math.max(p.speed - 6, 0);
                                Renderer.spawnItemEffect(p.x, p.z, '⚡');
                                this.addFloatingText(p.x, p.z, '⚡ ZAP!', '#ff6b6b');
                            }
                        }
                    });
                } else if (player.item === '⭐') {
                    player.speed = Math.min(player.speed + 4, 26);
                    this.addFloatingText(player.x, player.z, '⭐ STAR POWER!', '#ffd166');
                }
                
                player.item = null;
                this.addFloatingText(player.x, player.z, '✨ ITEM USED!', '#ffd166');
            }
            
            updatePlayerMovement(player, dt, isLocal) {
                const turnSpeed = 3.5 * dt;
                const acceleration = 18 * dt;
                const brakeForce = 22 * dt;
                const friction = 5 * dt;
                
                let steer = 0;
                let accel = 0;
                
                if (isLocal) {
                    // CONTROLES ARREGLADOS
                    if (this.keys.ArrowLeft) steer = -1;
                    if (this.keys.ArrowRight) steer = 1;
                    if (this.keys.ArrowUp) accel = 1;
                    if (this.keys.ArrowDown) accel = -0.7;
                } else {
                    // IA básica
                    const targetAngle = this.updateTrackPosition(player);
                    let angleDiff = targetAngle - player.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    steer = Math.max(-1, Math.min(1, angleDiff * 1.5));
                    accel = 0.8 + Math.random() * 0.3;
                }
                
                // Aplicar dirección
                if (player.speed > 0.5) {
                    player.angle += steer * turnSpeed * (player.speed / 15);
                } else if (player.speed < -0.5) {
                    player.angle -= steer * turnSpeed * 0.5;
                }
                
                // Aplicar aceleración/freno
                if (accel > 0) {
                    player.speed += acceleration * accel;
                    if (player.speed > 26) player.speed = 26;
                    
                    // Partículas al acelerar
                    if (isLocal && Math.random() < 0.3) {
                        Renderer.spawnDust(player.x, player.z, player.speed / 8, '#ffd166');
                    }
                } else if (accel < 0) {
                    player.speed += brakeForce * accel;
                    if (player.speed < -8) player.speed = -8;
                } else {
                    player.speed -= friction * Math.sign(player.speed);
                    if (Math.abs(player.speed) < 0.2) player.speed = 0;
                }
                
                // Mover
                const moveX = Math.cos(player.angle) * player.speed * dt;
                const moveZ = Math.sin(player.angle) * player.speed * dt;
                
                let newX = player.x + moveX;
                let newZ = player.z + moveZ;
                
                // Verificar límites de pista
                let onTrack = false;
                for (const p of this.trackPoints) {
                    const dx = p.x - newX;
                    const dz = p.z - newZ;
                    if (Math.hypot(dx, dz) < 8) {
                        onTrack = true;
                        break;
                    }
                }
                
                if (onTrack || Math.abs(player.speed) < 2) {
                    player.x = newX;
                    player.z = newZ;
                } else {
                    player.speed *= 0.5;
                }
                
                // Recoger items aleatorios
                if (isLocal && Math.random() < 0.005 && !player.item && this.gameState === 'racing') {
                    player.item = this.availableItems[Math.floor(Math.random() * this.availableItems.length)];
                    this.addFloatingText(player.x, player.z, `📦 ${player.item}`, '#06d6a0');
                }
                
                // Regenerar nitro
                if (player.nitro < 1) {
                    player.nitro = Math.min(1, player.nitro + dt * 0.15);
                }
            }
            
            updateRankings() {
                // Ordenar por vuelta y progreso
                this.players.sort((a, b) => {
                    if (a.lap !== b.lap) return b.lap - a.lap;
                    return (b.progress || 0) - (a.progress || 0);
                });
                
                this.players.forEach((p, idx) => {
                    p.position = idx + 1;
                });
            }
            
            resize() {
                const size = Math.min(window.innerWidth - 40, window.innerHeight - 40, 1300);
                this.canvas.width = size;
                this.canvas.height = size * 0.7;
                this.canvas.style.width = `${size}px`;
                this.canvas.style.height = `${size * 0.7}px`;
            }
            
            update(dt) {
                dt = Math.min(dt, 0.033);
                this.frame++;
                
                // Countdown
                if (this.gameState === 'countdown') {
                    this.countdown -= dt;
                    if (this.countdown <= 0) {
                        this.gameState = 'racing';
                        this.countdown = 0;
                    }
                }
                
                // Actualizar jugadores
                this.players.forEach(player => {
                    this.updatePlayerMovement(player, dt, player.id === 'local');
                    this.updateTrackPosition(player);
                });
                
                this.updateRankings();
                
                // Efectos visuales
                if (this.screenShake > 0) this.screenShake -= dt * 30;
                if (this.flashAlpha > 0) this.flashAlpha -= dt * 2;
                
                // Textos flotantes
                for (let i = this.floatingTexts.length-1; i >= 0; i--) {
                    this.floatingTexts[i].life -= dt * 1.5;
                    this.floatingTexts[i].offsetY -= dt * 30;
                    if (this.floatingTexts[i].life <= 0) {
                        this.floatingTexts.splice(i, 1);
                    }
                }
                
                // Actualizar cámara (sigue al jugador local)
                const localPlayer = this.players.find(p => p.id === 'local');
                if (localPlayer) {
                    this.camX = localPlayer.x;
                    this.camZ = localPlayer.z;
                    this.camAngle = localPlayer.angle;
                }
                
                // Actualizar partículas del renderer
                Renderer.updateParticles(this.ctx, this.camX, this.camZ);
            }
            
            render() {
                const W = this.canvas.width;
                const H = this.canvas.height;
                
                // Aplicar screen shake
                let shakeX = 0, shakeY = 0;
                if (this.screenShake > 0) {
                    shakeX = (Math.random() - 0.5) * this.screenShake;
                    shakeY = (Math.random() - 0.5) * this.screenShake;
                }
                
                this.ctx.save();
                this.ctx.translate(shakeX, shakeY);
                
                // Renderizar mundo 3D
                Renderer.drawSky(this.ctx, W, H, this.frame);
                Renderer.drawGround(this.ctx, W, H, this.camX, this.camZ, this.camAngle);
                
                // Renderizar karts
                const scale = 35;
                for (const player of this.players) {
                    const isLocal = player.id === 'local';
                    const screenX = W/2 + (player.x - this.camX) * scale;
                    const screenY = H/2 + (player.z - this.camZ) * scale;
                    
                    if (screenX > -100 && screenX < W+100 && screenY > -100 && screenY < H+100) {
                        const kartScale = 0.45;
                        Renderer.drawKartSprite(
                            this.ctx, screenX, screenY, kartScale,
                            player.color, player.name, isLocal,
                            this.frame * 0.02, player.position === 1
                        );
                    }
                }
                
                // Renderizar partículas
                Renderer.drawParticles(this.ctx, this.camX, this.camZ, W, H, scale);
                
                // Renderizar textos flotantes
                for (const txt of this.floatingTexts) {
                    const screenX = W/2 + (txt.x - this.camX) * scale;
                    const screenY = H/2 + (txt.z - this.camZ) * scale + txt.offsetY;
                    if (screenX > 0 && screenX < W && screenY > 0 && screenY < H) {
                        this.ctx.save();
                        this.ctx.globalAlpha = txt.life;
                        this.ctx.font = `bold ${20 * txt.life}px 'Fredoka One', cursive`;
                        this.ctx.textAlign = 'center';
                        this.ctx.fillStyle = txt.color;
                        this.ctx.shadowBlur = 8;
                        this.ctx.shadowColor = '#000';
                        this.ctx.fillText(txt.text, screenX, screenY);
                        this.ctx.restore();
                    }
                }
                
                // Flash effect
                if (this.flashAlpha > 0) {
                    this.ctx.fillStyle = `rgba(255,255,200,${this.flashAlpha * 0.5})`;
                    this.ctx.fillRect(0, 0, W, H);
                }
                
                // HUD
                const localPlayer = this.players.find(p => p.id === 'local');
                if (localPlayer) {
                    Renderer.drawHUD(this.ctx, W, H, {
                        speed: Math.abs(localPlayer.speed),
                        lap: localPlayer.lap,
                        maxLaps: this.maxLaps,
                        pos: localPlayer.position,
                        total: this.players.length,
                        item: localPlayer.item,
                        name: localPlayer.name,
                        countdown: this.gameState === 'countdown' ? this.countdown : 0,
                        nitro: localPlayer.nitro
                    });
                }
                
                // Minimapa
                const mmSize = 140;
                const mmCanvas = document.createElement('canvas');
                mmCanvas.width = mmSize;
                mmCanvas.height = mmSize;
                const mmCtx = mmCanvas.getContext('2d');
                Renderer.drawMinimap(mmCtx, mmSize, mmSize, this.trackPoints, this.players, this.localPlayerId, this.frame);
                this.ctx.drawImage(mmCanvas, W - mmSize - 15, 15, mmSize, mmSize);
                
                this.ctx.restore();
            }
            
            animate() {
                const now = performance.now();
                let dt = 0.016;
                if (this.lastTime) {
                    dt = Math.min(0.033, (now - this.lastTime) / 1000);
                }
                this.lastTime = now;
                
                this.update(dt);
                this.render();
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // Iniciar juego
        window.addEventListener('load', () => {
            new ClaudeKart();
        });
    </script>
</body>
</html>

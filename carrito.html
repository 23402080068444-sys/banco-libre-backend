<!DOCTYPE html>
<html>
<head>
  <title>Carrito</title>
  <style>
    body { margin:0; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background-color:#e5e5e5; display:flex; align-items:center; justify-content:center; height:100vh; }
    .app { width:390px; height:667px; background:#fff; border-radius:40px; box-shadow:0 10px 30px rgba(0,0,0,0.3);
      overflow:hidden; position:relative; display:flex; flex-direction:column; }
    h1 { color:#007aff; }
    button { background:#007aff; color:white; border:none; border-radius:12px; padding:12px 20px; font-size:16px;
      margin:10px; cursor:pointer; }
    button:hover { background:#005bb5; }
    .header { position:absolute; top:0; left:0; width:100%; height:60px; background:#007aff; color:white;
      display:flex; align-items:center; padding:0 15px; z-index:1000; }
    .title { font-weight:bold; }
    .contenido { padding-top:80px; text-align:center; }
    ul { list-style:none; padding:0; }
    ul li { background:#f2f2f7; margin:5px 0; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="menu-icon" onclick="history.back()">☰</div>
      <div class="title">Banco Libre</div>
    </div>
    <div class="contenido">
      <h1>Carrito de Criptomonedas</h1>
      <div>
        <label>Correo electrónico:</label><br>
        <input type="email" id="email" required>
        <button onclick="cargarCarrito()">Ver carrito</button>
      </div>
      <ul id="listaCarrito"></ul>
      <button onclick="checkout()">Comprar</button>
    </div>
  </div>
</body>
<script>
  // Recuperar correo automáticamente
  const userEmail = localStorage.getItem("correo") || 
                    new URLSearchParams(window.location.search).get("correo");

  async function cargarCarrito() {
    if (!userEmail) {
      alert("No hay sesión activa");
      return;
    }

    const res = await fetch(`/carrito/${userEmail}`);
    const data = await res.json();
    const lista = document.getElementById('listaCarrito');
    lista.innerHTML = "";

    if (!data.carrito || data.carrito.length === 0) {
      lista.innerHTML = "<li>Tu carrito está vacío</li>";
      return;
    }

    data.carrito.forEach(item => {
      const li = document.createElement("li");
      const total = item.cantidad * item.precioUnitario;
      li.innerHTML = `
        ${item.crypto} x${item.cantidad} - $${total}
        <button onclick="eliminar('${item.crypto}')">Eliminar</button>
      `;
      lista.appendChild(li);
    });
  }

  async function eliminar(crypto) {
    const res = await fetch('/carrito/remove', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ userEmail, crypto })
    });
    const data = await res.json();
    alert(data.mensaje);
    cargarCarrito();
  }

  async function checkout() {
    if (!userEmail) {
      alert("No hay sesión activa");
      return;
    }

    const res = await fetch('/carrito/checkout', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ userEmail })
    });
    const data = await res.json();
    alert(data.mensaje);
    cargarCarrito();
  }

  // Cargar carrito al abrir la página
  window.onload = cargarCarrito;
</script>


</html>

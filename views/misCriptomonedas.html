<!DOCTYPE html>
<html>
<head>
  <title>Mis Criptomonedas</title>
  <style>
    body { margin:0; padding:20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background-color:#e5e5e5; display:flex; align-items:center; justify-content:center; height:100vh; }
    .app { width:390px; height:667px; background:#fff; border-radius:40px; box-shadow:0 10px 30px rgba(0,0,0,0.3);
      overflow:hidden; position:relative; display:flex; flex-direction:column; }
    h1 { color:#007aff; }
    .header { position:absolute; top:0; left:0; width:100%; height:60px; background:#007aff; color:white;
      display:flex; align-items:center; padding:0 15px; z-index:1000; }
    .title { font-weight:bold; }
    .contenido { padding-top:80px; text-align:center; }
    ul { list-style:none; padding:0; }
    ul li { background:#f2f2f7; margin:5px 0; padding:10px; border-radius:8px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header"><div class="title">Banco Libre</div></div>
    <div class="contenido">
      <h1>Mis Criptomonedas</h1>
      <div>
        <label>Correo electrónico:</label><br>
        <input type="email" id="email" required>
        <button onclick="cargarMisCriptos()">Ver mis criptos</button>
      </div>
      <ul id="listaMisCriptos"></ul>
    </div>
  </div>
</body>
<script>
  async function cargarMisCriptos() {
    const email = document.getElementById('email').value;
    const res = await fetch(`/mis-criptos/${email}`);
    const data = await res.json();
    const lista = document.getElementById('listaMisCriptos');
    lista.innerHTML = "";

    if (!data.compras || data.compras.length === 0) {
      lista.innerHTML = "<li>No tienes criptos compradas</li>";
      return;
    }

    data.compras.forEach(c => {
      c.items.forEach(i => {
        // Mostrar cripto, cantidad y valor total
        const li = document.createElement("li");
        li.innerHTML = `${i.crypto} x${i.cantidad} - $${i.cantidad * i.precioUnitario}`;
        lista.appendChild(li);
      });
    });
  }
</script>

</html>
